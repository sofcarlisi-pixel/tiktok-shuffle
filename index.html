<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Shuffle</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:#0f0f12;
  color:white;
  max-width:700px;
  margin:auto;
  padding:22px;
}

h1{
  text-align:center;
  margin-bottom:6px;
}

p{
  text-align:center;
  color:#aaa;
}

input,select{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:14px;
  border:1px solid #333;
  background:#1b1b22;
  color:white;
  box-sizing:border-box;
  margin:8px 0;
}

button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.add{background:#ff2d55;color:white;}
.shuffle{background:#25F4EE;color:black;}
.secondary{background:#292933;color:white;}
.delete{background:#3a1f27;color:#ffb6c8;}

.card{
  background:#17171d;
  border:1px solid #2a2a33;
  border-radius:22px;
  padding:16px;
  margin-top:16px;
}

#list{
  max-height:390px;
  overflow-y:auto;
  margin-top:12px;
}

.item{
  padding:12px;
  border:1px solid #2a2a33;
  border-radius:16px;
  margin-bottom:10px;
  background:#101014;
}

.item a{
  color:#25F4EE;
  word-break:break-word;
  text-decoration:none;
}

.meta{
  color:#aaa;
  font-size:13px;
  margin-top:6px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.smallBtn{
  padding:10px;
  font-size:14px;
}

.stats{
  display:flex;
  justify-content:space-between;
  color:#aaa;
  font-size:14px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🎲 TikTok Shuffle</h1>
<p>Your editing inspo library</p>

<div class="card">
  <input id="link" placeholder="Paste TikTok link here">
  <input id="note" placeholder="Optional note: transition, audio, text, etc.">

  <button class="add" onclick="addLink()">Add Edit</button>
  <button class="shuffle" onclick="shuffleAll()">Shuffle All</button>

  <div class="row">
    <button class="secondary" onclick="shuffleFavorites()">Shuffle Favorites</button>
    <button class="delete" onclick="clearAll()">Clear All</button>
  </div>

  <div class="stats">
    <span id="count">0 saved</span>
    <span id="favCount">0 favorites</span>
  </div>
</div>

<div class="card">
  <input id="search" placeholder="Search links or notes" oninput="render()">
  <div id="list"></div>
</div>

<script>
const STORAGE="tiktok_shuffle_v3";

function getLinks(){
  return JSON.parse(localStorage.getItem(STORAGE) || "[]");
}

function saveLinks(arr){
  localStorage.setItem(STORAGE,JSON.stringify(arr));
  render();
}

function addLink(){
  let url=document.getElementById("link").value.trim();
  let note=document.getElementById("note").value.trim();

  if(!url){
    alert("Paste a TikTok link first.");
    return;
  }

  if(!url.toLowerCase().includes("tiktok")){
    alert("That does not look like a TikTok link.");
    return;
  }

  let links=getLinks();

  if(links.some(x=>x.url===url)){
    alert("Already saved!");
    return;
  }

  links.unshift({
    url:url,
    note:note,
    favorite:false,
    views:0,
    added:new Date().toLocaleDateString()
  });

  saveLinks(links);

  document.getElementById("link").value="";
  document.getElementById("note").value="";
}

function openLink(index){
  let links=getLinks();
  links[index].views++;
  saveLinks(links);
  window.location.href=links[index].url;
}

function shuffleAll(){
  let links=getLinks();

  if(!links.length){
    alert("No TikToks saved.");
    return;
  }

  let index=Math.floor(Math.random()*links.length);
  openLink(index);
}

function shuffleFavorites(){
  let links=getLinks();
  let favorites=links
    .map((x,i)=>x.favorite ? i : null)
    .filter(x=>x!==null);

  if(!favorites.length){
    alert("No favorites yet.");
    return;
  }

  let index=favorites[Math.floor(Math.random()*favorites.length)];
  openLink(index);
}

function toggleFavorite(index){
  let links=getLinks();
  links[index].favorite=!links[index].favorite;
  saveLinks(links);
}

function deleteLink(index){
  let links=getLinks();
  links.splice(index,1);
  saveLinks(links);
}

function clearAll(){
  if(confirm("Delete all saved TikToks?")){
    localStorage.removeItem(STORAGE);
    render();
  }
}

function render(){
  let links=getLinks();
  let query=document.getElementById("search").value.toLowerCase();

  document.getElementById("count").textContent=links.length+" saved";
  document.getElementById("favCount").textContent=links.filter(x=>x.favorite).length+" favorites";

  let filtered=links
    .map((x,i)=>({x,i}))
    .filter(obj=>
      obj.x.url.toLowerCase().includes(query) ||
      obj.x.note.toLowerCase().includes(query)
    );

  let html="";

  if(!filtered.length){
    html="<p>No saved edits yet.</p>";
  }

  filtered.forEach(({x,i})=>{
    html+=`
      <div class="item">
        <a href="${x.url}" target="_blank">${x.url}</a>
        <div class="meta">
          ${x.note ? "Note: "+x.note+"<br>" : ""}
          Added: ${x.added} · Viewed: ${x.views}
        </div>

        <div class="row">
          <button class="secondary smallBtn" onclick="openLink(${i})">Open</button>
          <button class="secondary smallBtn" onclick="toggleFavorite(${i})">
            ${x.favorite ? "★ Favorited" : "☆ Favorite"}
          </button>
        </div>

        <button class="delete smallBtn" onclick="deleteLink(${i})">Delete</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

render();
</script>

</body>
</html>
